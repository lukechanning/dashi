  # Ruby default gem CVEs (erb, net-imap, zlib) — stale gemspec artifacts from ruby:3.4-slim base image.
  # Default gems ship bundled gemspecs in /usr/local/lib/ruby/gems/*/specifications/default/. gem update
  # installs the patched version into the system gem path (active at runtime) but does NOT remove the old
  # stub gemspec — so Trivy still finds the old version metadata. The Dockerfile now explicitly deletes
  # those stale stubs after gem update; these entries are belt-and-suspenders in case a path changes.
  # See Dockerfile: RUN gem update erb net-imap zlib && find .../specifications/default -delete.
  - id: CVE-2026-41316
    statement: erb patched via gem update + stale default gemspec deleted in Dockerfile; entry retained as safety net
    expired_at: 2027-01-01
  - id: CVE-2026-42246
    statement: net-imap 0.6.4 (fixed) via gem update + stale default gemspec deleted in Dockerfile; entry retained as safety net
    expired_at: 2027-01-01

  # Ruby default gem CVEs (erb, net-imap) — stale gemspec artifacts from ruby:3.4-slim base image.
  # Default gems ship bundled gemspecs that cannot be removed; gem update in the Dockerfile final stage
  # installs the patched versions which are active at runtime. See Dockerfile: RUN gem update erb net-imap.
  - id: CVE-2026-41316
    statement: erb patched via gem update in Dockerfile; stale default gemspec in ruby base image is a scanner artifact, not the active version
    expired_at: 2027-01-01
  - id: CVE-2026-42246
    statement: net-imap 0.6.4 (fixed) installed via gem update in Dockerfile; stale default gemspec in ruby base image is a scanner artifact
    expired_at: 2027-01-01
  - id: CVE-2026-42245
    statement: net-imap 0.6.4 (fixed) installed via gem update in Dockerfile; stale default gemspec in ruby base image is a scanner artifact
